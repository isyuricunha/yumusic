name: Release

on:
  push:
    branches:
      - main

# Prevent concurrent releases
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Determine the next version with semantic-release.
  # Runs on Ubuntu (fast, cheap). Creates the GitHub Release as a DRAFT and
  # outputs the new tag so the build matrix can upload assets to it.
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
      new_release_tag: ${{ steps.semantic.outputs.new_release_git_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history is required for semantic-release to analyse all commits.
          fetch-depth: 0
          # Use the PAT so that semantic-release can push the version bump commit
          # and the tag even when branch protection is enabled.
          token: ${{ secrets.GH_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install semantic-release and plugins
        run: >
          npm install --no-save
          semantic-release
          conventional-changelog-conventionalcommits
          @semantic-release/commit-analyzer
          @semantic-release/release-notes-generator
          @semantic-release/changelog
          @semantic-release/git
          @semantic-release/github

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: npx semantic-release

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Build the Tauri app on every target platform and upload the
  # produced bundles to the GitHub Release created in Job 1.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x86_64
          - platform: windows-latest
            args: ''
            label: windows-x86_64

          # macOS Apple Silicon (M1/M2/M3)
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            label: macos-arm64

          # macOS Intel
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            label: macos-x86_64

          # Linux x86_64
          - platform: ubuntu-22.04
            args: ''
            label: linux-x86_64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.new_release_tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS builds need both targets available on the runner.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache Rust build artefacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        with:
          # tauri-action will find the existing release by tag and upload to it.
          tagName: ${{ needs.release.outputs.new_release_tag }}
          releaseName: YuMusic ${{ needs.release.outputs.new_release_version }}
          # The release already exists (created by semantic-release); treat it
          # as a draft so tauri-action can attach the assets.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Once ALL platform builds succeed, publish the release (undraft it).
  # ─────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish Release
    needs: [release, build]
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Publish GitHub Release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const tag = '${{ needs.release.outputs.new_release_tag }}';
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const release = releases.find(r => r.tag_name === tag);
            if (!release) {
              core.setFailed(`Release with tag ${tag} not found.`);
              return;
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false,
            });
            console.log(`Released: ${release.html_url}`);
