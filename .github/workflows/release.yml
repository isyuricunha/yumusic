name: Release

on:
  push:
    branches:
      - main

# Prevent concurrent releases from running in parallel.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Force all JavaScript actions to run on Node.js 24 to avoid deprecation warnings.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Semantic Release
  # Analyses conventional commits, bumps the version, creates a GitHub Release
  # and pushes a CHANGELOG.md update. Exposes the new tag as an output
  # so the build matrix can reference it.
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
      new_release_tag: ${{ steps.semantic.outputs.new_release_git_tag }}
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          # Extra plugins not bundled with semantic-release itself.
          extra_plugins: |
            conventional-changelog-conventionalcommits
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/exec
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Multi-platform Tauri build
  # Runs in parallel on Windows, macOS (arm64 + x86_64), and Ubuntu.
  # Only uploads binaries and latest.json to the GitHub Release when
  # semantic-release published a new version (new_release_published == true).
  #
  # Key design decisions:
  #   - releaseDraft: false — semantic-release already publishes the release.
  #     tauri-action must NOT mark it as draft or it will conflict.
  #   - The "Build & upload to release" step runs only when a new release was
  #     published, avoiding ghost releases from non-release pushes.
  #   - createUpdaterArtifacts: true in tauri.conf.json (required!) tells
  #     Tauri to produce .sig files, which tauri-action uses to build latest.json.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.label }})
    needs: release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
            label: windows-x86_64

          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            label: macos-arm64

          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            label: macos-x86_64

          - platform: ubuntu-22.04
            args: ''
            label: linux-x86_64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.new_release_tag || github.sha }}

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      # Only upload to the GitHub Release when semantic-release published a new
      # version. When there is no release (e.g. chore/doc-only commits), we still
      # build the app (cache warmup + CI validation) but skip the upload to avoid
      # creating empty or malformed releases.
      - name: Build & upload to release
        if: needs.release.outputs.new_release_published == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Attach assets to the release that semantic-release already created.
          # releaseDraft MUST be false: semantic-release publishes the release
          # immediately, so tauri-action must not try to flip it back to draft.
          tagName: ${{ needs.release.outputs.new_release_tag }}
          releaseName: 'YuMusic ${{ needs.release.outputs.new_release_version }}'
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      - name: Upload build artifacts (workflow artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: YuMusic-${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
