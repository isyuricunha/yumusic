name: Release

on:
  push:
    branches:
      - main

# Prevent concurrent releases from running in parallel.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Force all JavaScript actions to run on Node.js 24 to avoid deprecation warnings.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Semantic Release
  # Analyses conventional commits, bumps the version, creates a GitHub Release
  # draft, and pushes a CHANGELOG.md update. Exposes the new tag as an output
  # so the build matrix can reference it.
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
      new_release_tag: ${{ steps.semantic.outputs.new_release_git_tag }}
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          # Extra plugins not bundled with semantic-release itself.
          extra_plugins: |
            conventional-changelog-conventionalcommits
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/exec
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Multi-platform Tauri build
  # Runs in parallel on Windows, macOS (arm64 + x86_64), and Ubuntu.
  # Each runner uploads its bundles to the draft release created above.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.label }})
    needs: release
    # Runs on every push to main to provide binaries even if no formal release is published.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
            label: windows-x86_64

          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            label: macos-arm64

          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            label: macos-x86_64

          - platform: ubuntu-22.04
            args: ''
            label: linux-x86_64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.new_release_tag || github.sha }}

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build & upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.release.outputs.new_release_tag || '' }}
          releaseName: ${{ needs.release.outputs.new_release_published == 'true' && format('YuMusic {0}', needs.release.outputs.new_release_version) || '' }}
          # Only use draft if we are actually attaching to a release tag.
          releaseDraft: ${{ needs.release.outputs.new_release_published == 'true' }}
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: YuMusic-${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/setup.exe
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn


  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Publish
  # Removes the draft flag only after ALL platform builds have succeeded.
  # ─────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish Release
    needs: [release, build]
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Undraft GitHub Release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const tag = '${{ needs.release.outputs.new_release_tag }}';
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const release = releases.find(r => r.tag_name === tag);
            if (!release) {
              core.setFailed(`Release with tag "${tag}" not found.`);
              return;
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false,
            });
            console.log(`✅ Published: ${release.html_url}`);
